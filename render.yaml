services:
  - type: web
    name: cardforge-api
    runtime: python
    rootDir: backend
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn cardforge.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /healthz/
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DJANGO_SETTINGS_MODULE
        value: cardforge.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: FRONTEND_URL
        value: https://cardforge-web.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://cardforge-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://cardforge-web.onrender.com

  - type: web
    name: cardforge-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: REACT_APP_API_URL
        value: https://cardforge-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
